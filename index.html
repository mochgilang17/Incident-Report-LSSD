<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD Incident Report Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<div class="report-container" id="report-content">
    <header class="report-header">
        <div class="header-main">
            <h2>COUNTY OF LOS SANTOS</h2>
            <h1>SHERIFF'S DEPARTMENT</h1>
            <p class="sa-state">San Andreas State</p>
            <h3>INCIDENT REPORT</h3>
        </div>
        <div class="official-use">FOR OFFICIAL USE ONLY</div>
    </header>

    <form>
        <div class="row top-bar">
            <div class="input-group">
                <label>URN:</label>
                <input type="text" placeholder="26-XXXX-CCCC">
            </div>
            <div class="input-group">
                <label>DR#:</label>
                <input type="text" placeholder="26-CCCC-CCCC">
            </div>
            <div class="input-group">
                <label>STATION:</label>
                <select>
                    <option>-</option>
                    <option>East Los Santos</option>
                    <option>Vinewood</option>
                    <option>Ganton</option>
                </select>
            </div>
        </div>

        <section class="form-section">
            <div class="section-title">INCIDENT INFORMATION</div>
            <div class="grid-4">
                <div class="input-group"><label>DATE:</label><input type="date"></div>
                <div class="input-group"><label>TIME:</label><input type="time"></div>
                <div class="input-group"><label>BEAT:</label><input type="text"></div>
                <div class="input-group"><label>UNIT:</label><input type="text"></div>
            </div>
            <div class="grid-1">
                <div class="input-group"><label>LOCATION:</label><input type="text" placeholder="street address, District, Los Santos"></div>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>INCIDENT TYPE:</label>
                    <select>
                        <option>-</option>
                        <option>187 - Homicide</option>
                        <option>211 - Robbery</option>
                        <option>459 - Burglary</option>
                        <option>245 - Assault</option>
                        <option>487 - Grand Theft</option>
                        <option>484 - Petty Theft</option>
                        <option>595 - Vandalism</option>
                        <option>647 - public disturbance</option>
                        <option>Vehicle Code</option>
                        <option>Other</option>
                </select>
                </div>
                <div class="input-group">
                    <label>CLASSIFICATION:</label>
                    <select>
                        <option>-</option>
                        <option>FELONY</option>
                        <option>MISDEMEANOR</option>
                        <option>INFRACTION</option>
                        <option>CIVIL</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="grid-2-col">
            <section class="form-section">
                <div class="section-title">VICTIM/REPORTING PARTY</div>
                <div class="input-group"><label>NAME:</label><input type="text"></div>
                <div class="grid-3">
                    <div class="input-group"><label>AGE:</label><input type="text"></div>
                    <div class="input-group"><label>SEX:</label>
                        <select>
                            <option>-</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="input-group"><label>RACE:</label>
                        <select>
                            <option>-</option>
                            <option>White</option>
                            <option>Black</option>
                            <option>Hispanic</option>
                            <option>Asian</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label>PHONE:</label><input type="text"></div>
            </section>

            <section class="form-section">
                <div class="section-title">SUSPECT INFORMATION</div>
                <div class="input-group"><label>NAME:</label><input type="text"></div>
                <div class="grid-2">
                    <div class="input-group"><label>AGE:</label><input type="text"></div>
                    <div class="input-group"><label>SEX:</label>
                        <select>
                            <option>-</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="input-group"><label>RACE:</label>
                        <select>
                            <option>-</option>
                            <option>White</option>
                            <option>Black</option>
                            <option>Hispanic</option>
                            <option>Asian</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label>DESCRIPTION:</label><input type="text"></div>
            </section>
        </div>

        <section class="form-section">
            <div class="section-title">NARRATIVE SUMMARY</div>
            <textarea rows="6" placeholder="Brief description of incident: What happened, when, where. Actions taken by deputies. Statements from parties involved. Any follow-up required."></textarea>
        </section>

        <div class="grid-2-col">
            <section class="form-section">
                <div class="section-title">REPORTING DEPUTY</div>
                <div class="input-group"><label>NAME:</label><input type="text" id="deputy-name-input" placeholder="Lastname, Firstname"></div>
                <div class="grid-2">
                    <div class="input-group"><label>BADGE#:</label><input type="text"></div>
                    <div class="input-group"><label>UNIT:</label><input type="text"></div>
                </div>
                <div class="input-group"><label>SUPERVISOR:</label><input type="text" id="supervisor-name-input" placeholder="Lastname, Firstname"></div>
            </section>

            <section class="form-section">
                <div class="section-title">DISPOSITION</div>
                <div class="checkbox-grid">
                    <label><input type="checkbox"> REPORT COMPLETED</label>
                    <label><input type="checkbox"> ARREST MADE</label>
                    <label><input type="checkbox"> CITATION ISSUED</label>
                    <label><input type="checkbox"> TO DETECTIVE</label>
                    <label><input type="checkbox"> UNFOUNDED</label>
                    <label><input type="checkbox"> CIVIL MATTER</label>
                </div>
            </section>
        </div>

        <footer class="form-footer">
            <div class="signature-block">
                <input type="text" id="deputy-sig-input" class="sig-input" placeholder="Lastname, Firstname" readonly>
                <p>REPORTING DEPUTY</p>
                <input type="date">
            </div>
            <div class="signature-block">
                <input type="text" id="supervisor-sig-input" class="sig-input" placeholder="Lastname, Firstname" readonly>
                <p>SUPERVISOR</p>
                <input type="date">
            </div>
        </footer>
    </form>
    <div class="footer-note">LSSD SH-R-49 (Rev 2026) - FOR OFFICIAL USE ONLY</div>
</div>

<div style="width: 850px; display: flex; justify-content: flex-end; margin-bottom: 15px; margin-top: 15px; "class="no-print">
    <button id="btn-export" style="
        padding: 10px 24px; 
        cursor: pointer; 
        background: #1a3c15; 
        color: white; 
        border: 2px solid #0d260d; 
        border-radius: 6px; 
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        gap: 8px;">
        <span style="font-size: 16px;">💾</span> EXPORT KE JPG
    </button>
</div>

<script>
    // Ambil elemen input untuk deputy
    const nameInput = document.getElementById('deputy-name-input');
    const sigInput = document.getElementById('deputy-sig-input');

    nameInput.addEventListener('input', function() {
        sigInput.value = nameInput.value;
    });

    // Lakukan hal yang sama untuk supervisor
    const supervisorNameInput = document.getElementById('supervisor-name-input');
    const supervisorSigInput = document.getElementById('supervisor-sig-input');

    supervisorNameInput.addEventListener('input', function() {
        supervisorSigInput.value = supervisorNameInput.value;
    });

    // Script Tambahan untuk Export ke JPG
document.getElementById('btn-export').addEventListener('click', function() {
    const report = document.getElementById('report-content');
    const inputs = report.querySelectorAll("input, textarea, select");
    const tempReplacements = [];

    // 1. Sembunyikan tombol agar tidak mengganggu proses (opsional)
    this.style.display = "none";

// 2. Loop melalui semua elemen form untuk membuat versi statis (Span/Div)
    inputs.forEach(el => {
        const replacement = document.createElement("div");
        
        let val = "";
        if (el.tagName === "SELECT") {
            val = el.options[el.selectedIndex].text;
            if (val === "-") val = "";
        } else if (el.type === "checkbox") {
            // Logika khusus untuk checkbox untuk menghindari masalah "on on on"
            val = el.checked ? "☑" : "☐"; // Menggunakan simbol Unicode untuk centang/kotak kosong
            replacement.style.fontFamily = "'Arial', sans-serif"; // Font standar agar simbol terbaca
        } else {
            val = el.value;
        }

        replacement.innerText = val || " "; 
        
        const style = window.getComputedStyle(el);
        // Pertahankan gaya font asli kecuali untuk checkbox yang sudah kita atur di atas
        if (el.type !== "checkbox") {
            replacement.style.fontFamily = style.fontFamily;
        }
        replacement.style.fontSize = style.fontSize;
        replacement.style.color = "#333";
        replacement.style.padding = style.padding;
        replacement.style.lineHeight = style.lineHeight;
        replacement.style.whiteSpace = "pre-wrap";
        replacement.style.wordWrap = "break-word";
        
        // Atur display: checkbox dalam label biasanya butuh penyesuaian agar sejajar teks
        if (el.type === "checkbox") {
            replacement.style.display = "inline-block";
            replacement.style.marginRight = "5px"; // Beri jarak sedikit dari teks label
            replacement.style.verticalAlign = "middle";
        } else {
            replacement.style.display = "inline-block";
        }
        
        if (el.tagName === "INPUT" && el.type !== "checkbox") {
            replacement.style.borderBottom = "1px solid #eee";
            replacement.style.minWidth = el.offsetWidth + "px";
        }
        
        if (el.tagName === "TEXTAREA") {
            replacement.style.width = "100%";
            replacement.style.minHeight = el.offsetHeight + "px";
            replacement.style.display = "block";
        }

        // Jangan sembunyikan checkbox asli, tapi buat transparan & tidak bisa diklik
        // Ini membantu html2canvas mempertahankan layout label yang benar
        if (el.type === "checkbox") {
            el.style.opacity = "0";
            el.style.pointerEvents = "none";
            // Sisipkan pengganti TEPAT sebelum elemen asli di dalam label
            el.parentNode.insertBefore(replacement, el);
        } else {
            el.style.display = "none";
            el.parentNode.insertBefore(replacement, el);
        }
        tempReplacements.push({ original: el, temp: replacement });
    });

    // 3. Jalankan html2canvas dengan skala lebih tinggi agar tajam (HD)
    html2canvas(report, {
        scale: 3, 
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false,
        // Memastikan lebar container tertangkap penuh
        windowWidth: report.scrollWidth,
        windowHeight: report.scrollHeight
    }).then(canvas => {
        const image = canvas.toDataURL("image/jpeg", 1.0);
        
        const link = document.createElement('a');
        link.download = `LSSD-Report-${Date.now()}.jpg`;
        link.href = image;
        link.click();

        // 4. KEMBALIKAN SEMUA KE SEMULA
        tempReplacements.forEach(item => {
            item.original.style.display = "";
            item.temp.remove();
        });
        this.style.display = "flex";
    });
});
// 4. KEMBALIKAN SEMUA KE SEMULA
        tempReplacements.forEach(item => {
            // Logika pemulihan yang disesuaikan
            if (item.original.type === "checkbox") {
                item.original.style.opacity = "";
                item.original.style.pointerEvents = "";
            } else {
                item.original.style.display = "";
            }
            item.temp.remove();
        });
        this.style.display = "flex";
</script>
</body>
</html>
